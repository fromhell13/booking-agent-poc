services:
  # LLM runtime for embeddings + chat (in-container)
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks: [backend]

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-25432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [backend]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [backend]

  mcp_server:
    build:
      context: ./mcp_server
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_HTTP_TIMEOUT: ${OLLAMA_HTTP_TIMEOUT}
      QDRANT_PATH: ${QDRANT_PATH}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MENU_CACHE_TTL_SECONDS: ${MENU_CACHE_TTL_SECONDS}
    volumes:
      - qdrant_data:/data/qdrant_local
    networks: [backend]
    depends_on:
      - postgres
      - ollama
      - redis
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"

  # one-off ingestion job (only when you run it)
  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      QDRANT_PATH: ${QDRANT_PATH}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - qdrant_data:/data/qdrant_local
      - ./sample_menu:/app/sample_menu:ro
    networks: [backend]
    profiles: ["ingest"]
    depends_on:
      - ollama
      - redis

  agent:
    build:
      context: ./agents
    environment:
      MCP_URL: ${MCP_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL}
      OLLAMA_HTTP_TIMEOUT: ${OLLAMA_HTTP_TIMEOUT}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT}
      AGENTOPS_API_KEY: ${AGENTOPS_API_KEY:-}
    networks: [frontend, backend]
    depends_on:
      - mcp_server
      - ollama
    expose:
      - "8080"

  streamlit:
    build:
      context: ./streamlit
    environment:
      AGENT_URL: ${AGENT_URL}
      AGENT_REQUEST_TIMEOUT: ${AGENT_REQUEST_TIMEOUT}
    networks: [frontend]
    depends_on:
      - agent
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"

networks:
  frontend:
  backend:

volumes:
  pg_data:
  qdrant_data:
  ollama_data:
  redis_data:
